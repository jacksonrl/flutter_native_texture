name: flutter_native_texture
description: Direct WebGPU bindings for Flutter.
version: 0.1.0
homepage:
repository: 

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  ffi: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  ffigen: #currently requires master branch

flutter:
  plugin:
    platforms:
      android:
        package: com.funguscow.flutter_native_texture
        pluginClass: FlutterNativeTexturePlugin
        ffiPlugin: true
      windows:
        pluginClass: FlutterNativeTexturePluginCApi
